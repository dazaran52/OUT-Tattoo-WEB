<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Safe area for maskable icon is the inner 80% (approx 410x410) -->
  <rect width="512" height="512" fill="#171717" />
  <g transform="translate(256, 256)">
    <!-- Centered Logo Group -->
    <g transform="translate(-190, -45)">
      <text x="0" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#FFFFFF" letter-spacing="-1">Tattoo</text>
      <g transform="translate(245, -10)">
        <rect width="140" height="90" rx="20" fill="url(#grad)" />
        <text x="70" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="900" fill="#171717" text-anchor="middle" letter-spacing="4">HUB</text>
      </g>
    </g>
  </g>
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E4E4E7" />
    </linearGradient>
  </defs>
</svg>
